openapi: 3.1.0
info:
  title: Resource Planner - Conflict Detection
  version: 0.1.0
paths:
  /api/draft-schedules:
    get:
      summary: Read generated draft schedules for the selected semester with validation alerts
      parameters:
        - name: semesterId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Generated draft schedules for the selected semester, including validation alerts on affected sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DraftScheduleResponse"
        "404":
          description: Selected semester does not exist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/courses/{courseId}/draft-schedule/generate:
    post:
      summary: Generate or replace a course draft schedule and return validation alerts for the generated schedule
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateDraftScheduleRequest"
      responses:
        "201":
          description: Draft Schedule generated; sessions include validation alerts produced by the resulting selected-semester schedule state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DraftScheduleResponse"
        "404":
          description: Course or semester not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Generation input rejected before a Draft Schedule is produced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerationFailureResponse"
  /api/courses/{courseId}/draft-schedule:
    get:
      summary: Read one generated draft schedule with validation alerts
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Generated Draft Schedule for the course; sessions include validation alerts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DraftScheduleResponse"
        "404":
          description: No generated Draft Schedule exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/draft-sessions/{sessionId}:
    patch:
      summary: Update an existing generated Draft Session and return refreshed validation alerts
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDraftSessionRequest"
      responses:
        "200":
          description: Draft Session updated; response contains the updated parent Draft Schedule with refreshed validation alerts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DraftScheduleResponse"
        "404":
          description: Draft Session or replacement room not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Edit rejected by existing manual-edit validation; existing Draft Session data remains unchanged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionEditFailureResponse"
components:
  schemas:
    DraftScheduleResponse:
      type: object
      required:
        - draftScheduleId
        - courseId
        - semesterId
        - context
        - sessions
      properties:
        draftScheduleId:
          type: integer
        courseId:
          type: integer
        semesterId:
          type: integer
        context:
          $ref: "#/components/schemas/DraftScheduleContext"
        sessions:
          type: array
          items:
            $ref: "#/components/schemas/DraftSessionResponse"
    DraftScheduleContext:
      type: object
      required:
        - course
        - cohort
        - cohortSize
        - lecturer
        - room
        - studyType
      properties:
        course:
          $ref: "#/components/schemas/PlanningEntity"
        cohort:
          $ref: "#/components/schemas/PlanningEntity"
        cohortSize:
          type: integer
        lecturer:
          $ref: "#/components/schemas/PlanningEntity"
        room:
          $ref: "#/components/schemas/PlanningEntity"
        studyType:
          $ref: "#/components/schemas/PlanningEntity"
    DraftSessionResponse:
      type: object
      required:
        - id
        - date
        - startTime
        - endTime
        - units
        - courseId
        - lecturerId
        - cohortId
        - roomId
        - studyTypeId
        - constraintWindowIndex
        - validationAlerts
      properties:
        id:
          type: integer
        date:
          type: string
          format: date
        startTime:
          type: string
          pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$"
        endTime:
          type: string
          pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$"
        units:
          type: integer
        courseId:
          type: integer
        lecturerId:
          type: integer
        cohortId:
          type: integer
        roomId:
          type: integer
        studyTypeId:
          type: integer
        timeWindowId:
          type: integer
          nullable: true
        constraintWindowIndex:
          type: integer
          minimum: 0
        validationAlerts:
          type: array
          items:
            $ref: "#/components/schemas/ValidationAlert"
    ValidationAlert:
      type: object
      required:
        - code
        - message
        - relatedSessions
      properties:
        code:
          type: string
          enum:
            - LECTURER_OVERLAP
            - ROOM_OVERLAP
            - COHORT_OVERLAP
            - ROOM_CAPACITY
            - GENERATION_CONSTRAINT_VIOLATION
            - STUDY_TYPE_WINDOW_VIOLATION
            - VALIDATION_DATA_MISSING
        message:
          type: string
        relatedSessions:
          type: array
          description: Every related conflicting session available in the selected semester for overlap alerts; empty for single-session violations.
          items:
            $ref: "#/components/schemas/RelatedSession"
    RelatedSession:
      type: object
      required:
        - sessionId
        - draftScheduleId
        - courseId
        - courseName
        - date
        - startTime
        - endTime
        - cohortName
        - lecturerName
        - roomName
      properties:
        sessionId:
          type: integer
        draftScheduleId:
          type: integer
        courseId:
          type: integer
        courseName:
          type: string
        date:
          type: string
          format: date
        startTime:
          type: string
        endTime:
          type: string
        cohortName:
          type: string
        lecturerName:
          type: string
        roomName:
          type: string
    PlanningEntity:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
        name:
          type: string
    GenerateDraftScheduleRequest:
      type: object
      description: Existing Slice 3 generation request.
    UpdateDraftSessionRequest:
      type: object
      description: Existing Slice 4 manual edit request.
    GenerationFailureResponse:
      type: object
      description: Existing generation failure response.
    SessionEditFailureResponse:
      type: object
      description: Existing manual edit failure response.
    ErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
