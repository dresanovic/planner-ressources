openapi: 3.1.0
info:
  title: Resource Planner - Manual Session Editing
  version: 0.1.0
paths:
  /api/draft-sessions/{sessionId}:
    patch:
      summary: Update an existing generated Draft Session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDraftSessionRequest"
      responses:
        "200":
          description: Draft Session updated; response contains the updated parent Draft Schedule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DraftScheduleResponse"
        "404":
          description: Draft Session or replacement room not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Edit rejected; existing Draft Session data remains unchanged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionEditFailureResponse"
  /api/planning-options:
    get:
      summary: Read planner options including room choices for manual editing
      responses:
        "200":
          description: Existing planning options plus room options with capacity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanningOptionsResponse"
  /api/draft-schedules:
    get:
      summary: Read generated draft schedules for the selected semester
      parameters:
        - name: semesterId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Generated draft schedules for the selected semester, including saved manual edits
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DraftScheduleResponse"
components:
  schemas:
    UpdateDraftSessionRequest:
      type: object
      required:
        - date
        - startTime
        - endTime
        - roomId
      properties:
        date:
          type: string
          format: date
          description: Must fall within the parent Draft Schedule semester.
        startTime:
          type: string
          pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$"
        endTime:
          type: string
          pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$"
          description: Must be later than startTime.
        roomId:
          type: integer
          description: Replacement Room. Capacity must be at least the session Cohort size.
    SessionEditFailureResponse:
      type: object
      required:
        - errors
      properties:
        errors:
          type: array
          items:
            $ref: "#/components/schemas/SessionEditFailure"
    SessionEditFailure:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - INVALID_SESSION_DATE
            - INVALID_SESSION_TIME_RANGE
            - INSUFFICIENT_ROOM_CAPACITY
            - DUPLICATE_SESSION_DATE
        message:
          type: string
    ErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
    PlanningOptionsResponse:
      type: object
      description: Existing planning-options response, extended with rooms.
      required:
        - courses
        - semesters
        - timeWindows
        - rooms
      properties:
        courses:
          type: array
          items:
            type: object
        semesters:
          type: array
          items:
            type: object
        timeWindows:
          type: array
          items:
            type: object
        rooms:
          type: array
          items:
            $ref: "#/components/schemas/RoomOption"
    RoomOption:
      type: object
      required:
        - id
        - name
        - capacity
      properties:
        id:
          type: integer
        name:
          type: string
        capacity:
          type: integer
          minimum: 0
    DraftScheduleResponse:
      type: object
      description: Existing draft schedule response, returned after edits and from semester overview.
      required:
        - draftScheduleId
        - courseId
        - semesterId
        - context
        - sessions
      properties:
        draftScheduleId:
          type: integer
        courseId:
          type: integer
        semesterId:
          type: integer
        context:
          type: object
        sessions:
          type: array
          items:
            $ref: "#/components/schemas/DraftSessionResponse"
    DraftSessionResponse:
      type: object
      required:
        - id
        - date
        - startTime
        - endTime
        - units
        - courseId
        - lecturerId
        - cohortId
        - roomId
        - studyTypeId
        - constraintWindowIndex
      properties:
        id:
          type: integer
        date:
          type: string
          format: date
        startTime:
          type: string
        endTime:
          type: string
        units:
          type: integer
          description: Teaching-unit coverage metadata from generation; not directly edited in Slice 4.
        courseId:
          type: integer
        lecturerId:
          type: integer
        cohortId:
          type: integer
        roomId:
          type: integer
        studyTypeId:
          type: integer
        timeWindowId:
          type: integer
          nullable: true
        constraintWindowIndex:
          type: integer
          minimum: 0
